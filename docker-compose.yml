version: '3.8'

services:
  # Frontend - React Application
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_GATEWAY_URL=${VITE_GATEWAY_URL:-http://localhost:3001}
    container_name: agentic-read-frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NODE_ENV=development
    depends_on:
      - gateway
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - agentic-read-network
    restart: unless-stopped

  # Gateway - Node.js API Gateway
  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: agentic-read-gateway
    ports:
      - "3001:3001"
    env_file:
      - ./gateway/.env
    environment:
      - NODE_ENV=development
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./gateway/src:/app/src
    networks:
      - agentic-read-network
    restart: unless-stopped

  # Backend - Python FastAPI
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: agentic-read-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/app:/app/app
      - ./backend/tests:/app/tests
    networks:
      - agentic-read-network
    restart: unless-stopped

networks:
  agentic-read-network:
    driver: bridge

volumes:
  db_data:
